name: preview
on:
  push:
    branches-ignore:
      - main
      - master
      - gh-pages

permissions:
  contents: write

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - run: pip install mkdocs-material mkdocs-static-i18n

      - name: Compute branch slug
        id: slug
        run: echo "slug=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - run: mkdocs build --site-dir _site

      - name: Deploy preview to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: preview/${{ steps.slug.outputs.slug }}
          keep_files: true
          commit_message: "preview: ${{ github.ref_name }} @ ${{ github.sha }}"

      - name: Print preview URL
        run: |
          echo "::notice title=Preview ready::https://docs.teqsas.de/preview/${{ steps.slug.outputs.slug }}/"
