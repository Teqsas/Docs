name: preview-cleanup
on:
  delete:

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Compute branch slug
        id: slug
        run: echo "slug=$(echo '${{ github.event.ref }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Remove preview directory
        run: |
          set -e
          DIR="preview/${{ steps.slug.outputs.slug }}"
          if [ -d "$DIR" ]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git rm -rf "$DIR"
            git commit -m "preview: remove ${{ github.event.ref }}"
            git push
          else
            echo "No preview directory at $DIR — nothing to clean."
          fi
