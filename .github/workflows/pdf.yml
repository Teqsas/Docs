name: pdf

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PANDOC_VERSION: "3.5"
      TYPST_VERSION: "0.12.0"
    steps:
      - uses: actions/checkout@v4

      - name: Prepare build dir
        run: mkdir -p build

      - name: Install Pandoc
        run: |
          set -uxo pipefail
          {
            curl -fsSL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb" -o /tmp/pandoc.deb
            sudo dpkg -i /tmp/pandoc.deb
            pandoc --version
          } 2>&1 | tee -a build/install.log
          exit "${PIPESTATUS[0]}"

      - name: Install Typst
        run: |
          set -uxo pipefail
          {
            curl -fsSL "https://github.com/typst/typst/releases/download/v${TYPST_VERSION}/typst-x86_64-unknown-linux-musl.tar.xz" -o /tmp/typst.tar.xz
            mkdir -p /tmp/typst
            tar -xf /tmp/typst.tar.xz -C /tmp/typst --strip-components=1
            sudo mv /tmp/typst/typst /usr/local/bin/typst
            typst --version
          } 2>&1 | tee -a build/install.log
          exit "${PIPESTATUS[0]}"

      - name: Install Ubuntu font (best effort)
        run: |
          set -uxo pipefail
          {
            sudo apt-get update
            sudo apt-get install -y fonts-ubuntu \
              || sudo apt-get install -y ttf-ubuntu-font-family \
              || echo "WARN: Ubuntu font not installed via apt; will fall back to default"
            fc-list | grep -i ubuntu || echo "No Ubuntu font registered"
          } 2>&1 | tee -a build/install.log
          # Don't fail the job if font install didn't succeed.
          true

      - name: Build LAPTEQPLUS DE — PDF
        run: |
          set -euxo pipefail
          cd docs/LAPTEQPLUS/Manual
          files=(
            manual_1.md manual_2.md manual_3.md manual_4.md manual_5.md
            manual_6.md manual_7.md manual_8.md manual_9.md manual_10.md
            manual_11.md manual_ce.md
          )
          {
            for f in "${files[@]}"; do
              cat "$f"
              printf '\n\n'
            done
          } | python3 "$GITHUB_WORKSPACE/pdf/preprocess_admonitions.py" \
            | pandoc \
              --from=markdown+fenced_divs \
              --pdf-engine=typst \
              --pdf-engine-opt="--root=$GITHUB_WORKSPACE" \
              --include-in-header="$GITHUB_WORKSPACE/pdf/preamble.typ" \
              --include-before-body="$GITHUB_WORKSPACE/pdf/cover.typ" \
              --lua-filter="$GITHUB_WORKSPACE/pdf/admonitions.lua" \
              --toc \
              -V title="LAP-TEQ PLUS — Bedienungsanleitung" \
              -V toc-depth=3 \
              -V lang=de \
              -V region=DE \
              -V mainfont=Ubuntu \
              -V monofont="Ubuntu Mono" \
              --verbose \
              -o "$GITHUB_WORKSPACE/build/LAPTEQPLUS_DE.pdf" 2>&1 | tee "$GITHUB_WORKSPACE/build/build.log"
          ls -la "$GITHUB_WORKSPACE/build/"

      - name: Post failure log as PR comment
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const candidates = ['build/build.log', 'build/install.log'];
            const sections = [];
            for (const p of candidates) {
              if (fs.existsSync(p)) {
                const log = fs.readFileSync(p, 'utf8');
                const tail = log.split('\n').slice(-80).join('\n');
                sections.push('### `' + p + '` (last 80 lines)\n\n```\n' + tail + '\n```');
              }
            }
            const runUrl = context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId;
            const header = '**`pdf` workflow failed.** Run: ' + runUrl + '\n\n';
            const body = sections.length
              ? header + sections.join('\n\n')
              : header + '_No log files captured before the failure._';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdf-build
          path: build/
          if-no-files-found: error
